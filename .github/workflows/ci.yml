---
name: CI
'on':
  pull_request:
  push:

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v2

      - name: Set up Python 3.
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Run yamllint
        uses: karancode/yamllint-github-action@v2.1.1

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24.2.2

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          # - 8.7.0   # -- base-path not supported
          # - 8.10.4  # -- base-path not supported
          # - 8.12.2
          - 8.13.3
        distro:
          - ubuntu-22.04
          # - rockylinux-9

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v2

      - name: DEBUG - BEFORE
        run: |
          hostname
          export

      - name: Start containers
        run: |
          cd molecule/setup/es_kb
          STACK_VERSION=${{ matrix.version }} docker-compose up -d

      - name: Install test dependencies.
        run: pip3 install ansible molecule 'molecule-plugins[docker]'

      - name: Run Molecule tests.
        run: |
          STACK_VERSION=${{ matrix.version }} molecule test -s default --destroy never
          STACK_VERSION=${{ matrix.version }} molecule test -s fleet --destroy never
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

      - name: DEBUG - STATE
        if: always()
        continue-on-error: true
        run: |
          docker ps -a
          docker exec instance-ubuntu-22.04 ps -fC elastic-agent
          docker exec instance-ubuntu-22.04 find /opt/Elastic/Agent -iname "*.log" -o -iname "*.ndjson"
          docker exec instance-ubuntu-22.04 systemctl status elastic-agent
          docker exec instance-ubuntu-22.04 ls -lrt /opt/Elastic/Agent/data
          docker exec instance-ubuntu-22.04 ls -lrt /opt/Elastic/Agent/data/elastic-agent-de80b0/logs

      - name: DEBUG - Copy before updload
        if: always()
        continue-on-error: true
        run: |
          docker cp 'instance-ubuntu-22.04:/opt/Elastic/Agent/data/elastic-agent-de80b0/logs' ~/
          sudo chmod -R 777 ~/logs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: my-artifact
          path: |
            ~/logs

      - name: Stop containers
        if: always()
        run: |
          cd molecule/setup/es_kb
          docker-compose down || true
