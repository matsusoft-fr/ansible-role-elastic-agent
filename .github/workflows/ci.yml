---
name: CI
'on':
  pull_request:
  push:

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v2

      - name: Set up Python 3.
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Run yamllint
        uses: karancode/yamllint-github-action@v2.1.1

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24.2.2

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro:
          - generic/rocky9

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v2

      - name: DEBUG - BEFORE
        run: |
          hostname
          export

      - name: Start containers
        run: |
          cd molecule/default/setup
          docker-compose up -d

      - name: Install test dependencies.
        run: pip3 install ansible molecule 'molecule-plugins[docker]'

      - name: Run Molecule tests.
        run: molecule test --destroy never
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}

      - name: DEBUG - STATE
        if: always()
        run: |
          docker ps -all
          docker exec instance-ubuntu ps -fC elastic-agent
          docker exec instance-ubuntu find /opt/Elastic/Agent -iname "*.log" -o -iname "*.ndjson"
          docker exec instance-ubuntu systemctl status elastic-agent
          docker exec instance-ubuntu ls -lrt /opt/Elastic/Agent/data/elastic-agent-de80b0/logs

      - name: DEBUG - Copy before updload
        if: always()
        run: |
          docker cp 'instance-ubuntu:/opt/Elastic/Agent/data/elastic-agent-de80b0/logs' ~/
          sudo chmod -R 777 ~/logs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: my-artifact
          path: |
            ~/logs

      - name: Stop containers
        if: always()
        run: |
          cd molecule/default/setup
          docker-compose down || true
